<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500">
  <!-- Стили -->
  <style>
    .title { font-family: Arial; font-size: 14px; font-weight: bold; text-anchor: middle; }
    .actor { font-family: Arial; font-size: 12px; font-weight: bold; text-anchor: middle; }
    .message { font-family: Arial; font-size: 10px; text-anchor: middle; }
    .note { font-family: Arial; font-size: 10px; text-anchor: middle; fill: #CC0000; }
    .actor-box { stroke-width: 2; }
    .lifeline { stroke: #000000; stroke-dasharray: 5,5; stroke-width: 1; }
    .message-arrow { stroke: #000000; stroke-width: 1; fill: none; marker-end: url(#arrowhead); }
    .note-box { stroke: #CC0000; fill: none; stroke-width: 1; }
  </style>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000000" />
    </marker>
  </defs>
  
  <!-- Заголовок -->
  <text x="250" y="20" class="title">Smart Contracts Async Flow</text>
  
  <!-- Блоки акторов -->
  <rect x="50" y="40" width="60" height="30" fill="#E0E8FF" stroke="#0000CC" class="actor-box" />
  <text x="80" y="60" class="actor">App</text>
  
  <rect x="170" y="40" width="60" height="30" fill="#E0FFE8" stroke="#00CC00" class="actor-box" />
  <text x="200" y="60" class="actor">FireFly</text>
  
  <rect x="290" y="40" width="120" height="30" fill="#FFF0E0" stroke="#CC6600" class="actor-box" />
  <text x="350" y="60" class="actor">Blockchain Connector</text>
  
  <rect x="430" y="40" width="60" height="30" fill="#F0E0FF" stroke="#6600CC" class="actor-box" />
  <text x="460" y="60" class="actor">Blockchain</text>
  
  <!-- Линии жизни -->
  <line x1="80" y1="70" x2="80" y2="480" class="lifeline" />
  <line x1="200" y1="70" x2="200" y2="480" class="lifeline" />
  <line x1="350" y1="70" x2="350" y2="480" class="lifeline" />
  <line x1="460" y1="70" x2="460" y2="480" class="lifeline" />
  
  <!-- Сообщения -->
  <!-- 1. Invoke custom contract -->
  <line x1="80" y1="100" x2="200" y2="100" class="message-arrow" />
  <text x="140" y="95" class="message">Invoke custom contract</text>
  
  <!-- 2. Submit transaction -->
  <line x1="200" y1="130" x2="350" y2="130" class="message-arrow" />
  <text x="275" y="125" class="message">Submit transaction</text>
  
  <!-- 3. Forward transaction -->
  <line x1="350" y1="160" x2="460" y2="160" class="message-arrow" />
  <text x="405" y="155" class="message">Forward transaction</text>
  
  <!-- 4. Transaction accepted -->
  <line x1="460" y1="190" x2="350" y2="190" class="message-arrow" />
  <text x="405" y="185" class="message">Transaction accepted</text>
  
  <!-- 5. Transaction accepted -->
  <line x1="350" y1="220" x2="200" y2="220" class="message-arrow" />
  <text x="275" y="215" class="message">Transaction accepted</text>
  
  <!-- 6. Accepted (Operation ID) -->
  <line x1="200" y1="250" x2="80" y2="250" class="message-arrow" />
  <text x="140" y="235" class="message">Accepted</text>
  <text x="140" y="245" class="message">(Operation ID)</text>
  
  <!-- 7. Process transaction -->
  <path d="M 460,280 L 490,280 L 490,300 L 460,300" class="message-arrow" />
  <text x="500" y="290" class="message" text-anchor="start">Process</text>
  
  <!-- 8. Emit blockchain events -->
  <line x1="460" y1="330" x2="350" y2="330" class="message-arrow" />
  <text x="405" y="325" class="message">Emit blockchain events</text>
  
  <!-- 9. Forward events -->
  <line x1="350" y1="360" x2="200" y2="360" class="message-arrow" />
  <text x="275" y="355" class="message">Forward events</text>
  
  <!-- 10. Store events in database -->
  <path d="M 200,390 L 230,390 L 230,410 L 200,410" class="message-arrow" />
  <text x="240" y="400" class="message" text-anchor="start">Store events in database</text>
  
  <!-- 11. Emit blockchain_event_received -->
  <line x1="200" y1="440" x2="80" y2="440" class="message-arrow" />
  <text x="140" y="435" class="message">Emit blockchain_event_received</text>
  
  <!-- Note -->
  <rect x="30" y="460" width="250" height="20" class="note-box" rx="5" ry="5" />
  <text x="155" y="473" class="note">App can subscribe to events via WebSockets or Webhooks</text>
</svg>
